###############################################################################
# azure-pipelines.yml
#
# Full CI/CD pipeline for the Sample C# Web App.
#
# STAGES:
#   1. build  — dotnet build + test + Docker build + push to ACR
#   2. deploy — kubectl apply to AKS
#
# PREREQUISITES (set these in Azure DevOps → Pipelines → Library):
#   - Service Connection "azure-subscription" (ARM)
#   - Pipeline variables are pre-populated by Terraform
#
# TRIGGER: Runs on every push to main branch.
###############################################################################

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - k8s/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main

variables:
  # These are set by Terraform in the build definition, but you can override here
  IMAGE_REPOSITORY: "sample-web-app"
  DOCKERFILE_PATH: "src/SampleWebApp/Dockerfile"
  DOCKER_BUILD_CONTEXT: "src/SampleWebApp"
  K8S_NAMESPACE: "sample-app"
  TAG: "$(Build.BuildId)"  # Unique tag per build

stages:
  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 1: Build — Compile, Test, Dockerise, Push to ACR
  # ════════════════════════════════════════════════════════════════════════════
  - stage: Build
    displayName: "Build and Push Docker Image"
    jobs:
      - job: BuildAndPush
        displayName: "Build, Test & Push"
        pool:
          name: "self-hosted-pool"

        steps:
          # ── 1. Restore & Build ──────────────────────────────────────────────
          - task: UseDotNet@2
            displayName: "Use .NET 8 SDK"
            inputs:
              packageType: sdk
              version: "8.x"

          - script: dotnet restore src/SampleWebApp/SampleWebApp.csproj
            displayName: "dotnet restore"

          - script: |
              dotnet build src/SampleWebApp/SampleWebApp.csproj \
                --configuration Release \
                --no-restore
            displayName: "dotnet build"

          # ── 2. Run Tests (if you add a test project later) ─────────────────
          # - script: dotnet test src/SampleWebApp.Tests/SampleWebApp.Tests.csproj --no-build
          #   displayName: "dotnet test"

          # ── 3. Docker: Login to ACR ─────────────────────────────────────────
          - task: AzureCLI@2
            displayName: "Login to ACR"
            inputs:
              azureSubscription: "azure-subscription"   # Service connection name
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_LOGIN_SERVER)

          # ── 4. Docker: Build & Tag image ──────────────────────────────────
          - script: |
              docker build \
                -t $(ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY):$(TAG) \
                -t $(ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY):latest \
                -f $(DOCKERFILE_PATH) \
                $(DOCKER_BUILD_CONTEXT)
            displayName: "Docker Build"

          # ── 5. Docker: Push to ACR ──────────────────────────────────────────
          - script: |
              docker push $(ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY):$(TAG)
              docker push $(ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY):latest
            displayName: "Docker Push to ACR"

          # ── 6. Publish k8s manifests as pipeline artifact ───────────────────
          - task: PublishPipelineArtifact@1
            displayName: "Publish K8s Manifests"
            inputs:
              targetPath: k8s
              artifact: k8s-manifests
              publishLocation: pipeline

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 2: Deploy — Apply Kubernetes Manifests to AKS
  # ════════════════════════════════════════════════════════════════════════════
  - stage: Deploy
    displayName: "Deploy to AKS"
    dependsOn: Build
    condition: succeeded()

    jobs:
      - deployment: DeployToAKS
        displayName: "Deploy to AKS (sample-app namespace)"
        pool:
          name: "self-hosted-pool"

        # Deployment strategy — tracks deployment history in Azure DevOps
        environment: "aks-dev"   # Create this environment in Azure DevOps UI first
        strategy:
          runOnce:
            deploy:
              steps:
                # ── 1. Download manifests artifact ──────────────────────────
                - task: DownloadPipelineArtifact@2
                  displayName: "Download K8s Manifests"
                  inputs:
                    artifact: k8s-manifests
                    path: $(System.DefaultWorkingDirectory)/k8s

                # ── 2. Get AKS credentials ───────────────────────────────────
                - task: AzureCLI@2
                  displayName: "Get AKS Credentials"
                  inputs:
                    azureSubscription: "azure-subscription"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(AKS_RESOURCE_GROUP) \
                        --name $(AKS_CLUSTER_NAME) \
                        --overwrite-existing

                # ── 3. Substitute image tag in deployment.yaml ───────────────
                - script: |
                    # Replace the placeholder image name with real ACR image + tag
                    sed -i "s|YOUR_ACR_LOGIN_SERVER/sample-web-app:latest|$(ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY):$(TAG)|g" \
                      $(System.DefaultWorkingDirectory)/k8s/deployment.yaml
                    echo "--- Updated deployment.yaml ---"
                    cat $(System.DefaultWorkingDirectory)/k8s/deployment.yaml
                  displayName: "Update Image Tag in Manifest"

                # ── 4. Apply manifests (using kubectl directly) ──────────────
                - script: |
                    kubectl apply -f $(System.DefaultWorkingDirectory)/k8s/namespace.yaml
                  displayName: "Apply Namespace"

                - script: |
                    kubectl apply -f $(System.DefaultWorkingDirectory)/k8s/deployment.yaml \
                      -n $(K8S_NAMESPACE)
                    kubectl apply -f $(System.DefaultWorkingDirectory)/k8s/service.yaml \
                      -n $(K8S_NAMESPACE)
                  displayName: "Deploy Application"

                # ── 5. Wait and print external IP ────────────────────────────
                - script: |
                    echo "Waiting for LoadBalancer External IP..."
                    for i in $(seq 1 20); do
                      EXTERNAL_IP=$(kubectl get svc sample-web-app \
                        -n $(K8S_NAMESPACE) \
                        -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
                      if [ -n "$EXTERNAL_IP" ]; then
                        echo ""
                        echo "✅ Application deployed successfully!"
                        echo "🌐 Access your app at: http://$EXTERNAL_IP"
                        echo "📖 Swagger UI at:       http://$EXTERNAL_IP/swagger"
                        echo "💊 Health check at:     http://$EXTERNAL_IP/health"
                        break
                      fi
                      echo "  Waiting... ($i/20)"
                      sleep 15
                    done
                  displayName: "Show Application URL"
