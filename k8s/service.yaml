apiVersion: v1
kind: Service
metadata:
  name: sample-web-app
  namespace: sample-app
  labels:
    app: sample-web-app
    app.kubernetes.io/name: sample-web-app
  annotations:
    # Azure-specific annotation — provisions an Azure Load Balancer
    service.beta.kubernetes.io/azure-load-balancer-resource-group: ""  # populated by AKS
spec:
  type: LoadBalancer
  selector:
    app: sample-web-app
  ports:
    - name: http
      protocol: TCP
      port: 80           # External port (what you type in browser)
      targetPort: 8080   # Pod port (what the container listens on)
  sessionAffinity: None
